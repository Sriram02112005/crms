<!DOCTYPE html>
<html>
<head>
    <title>My Bookings</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h2>My Bookings</h2>
    <a href="/dashboard" class="btn">Back to Dashboard</a>

    <table>
        <tr>
            <th>Resource</th>
            <th>Date</th>
            <th>Start Time</th>
            <th>End Time</th>
            <th>Status</th>
        </tr>

        {% for b in bookings %}
        <tr>
            <td>{{ b.resource_name }}</td>
            <td>{{ b.booking_date }}</td>
            <td>{{ b.start_time }}</td>
            <td>{{ b.end_time }}</td>
            <td>{{ b.status }}</td>
        </tr>
        {% endfor %}
    </table>
</div>

</body>
</html>
